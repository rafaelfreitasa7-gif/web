<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Feedbacks</title>
  <link rel="stylesheet" href="public/style.css">
</head>
<body>

  <div class="container">

    <h1>Enviar Feedback</h1>

    <form action="/feedbacks/enviar" method="POST">

      <input 
        type="text" 
        name="nome" 
        placeholder="Seu nome"
        required
      >

      <textarea 
        name="comentario" 
        placeholder="Digite seu feedback"
        required
      ></textarea>

      <button type="submit">
        Enviar Feedback
      </button>

    </form>

    <a href="/feedbacks/lista">
      Ver Feedbacks
    </a>

  </div>

</body>
</html>
